<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation Grid A3</title>
<style>
  @page { size: 420mm 297mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 420mm; height: 297mm; background: white; overflow: hidden; }
  svg  { display: block; width: 420mm; height: 297mm; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 420 297" width="420mm" height="297mm">

  <rect width="420" height="297" fill="white"/>
  <rect width="420" height="297" fill="none" stroke="#CCC" stroke-width="0.4"/>

  <!-- REF corner -->
  <line x1="0" y1="0" x2="20" y2="0" stroke="#E53935" stroke-width="1.5"/>
  <line x1="0" y1="0" x2="0" y2="20" stroke="#E53935" stroke-width="1.5"/>
  <text x="2" y="13" font-size="6" fill="#E53935" font-family="sans-serif"
        font-weight="bold">REF (0,0)</text>

  <!-- P1 (60.0,73.5)mm -->
  <circle cx="60.00" cy="73.50" r="25.0" fill="#E8F4FE" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="53.0" y1="73.5" x2="67.0" y2="73.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="60.0" y1="66.5" x2="60.0" y2="80.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="60.0" y="46.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P1</text>
  <text x="60.0" y="105.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(60,74)mm</text>
  <!-- P2 (210.0,73.5)mm -->
  <circle cx="210.00" cy="73.50" r="25.0" fill="#FFF8E8" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="203.0" y1="73.5" x2="217.0" y2="73.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="210.0" y1="66.5" x2="210.0" y2="80.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="210.0" y="46.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P2</text>
  <text x="210.0" y="105.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(210,74)mm</text>
  <!-- P3 (360.0,73.5)mm -->
  <circle cx="360.00" cy="73.50" r="25.0" fill="#E8F4FE" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="353.0" y1="73.5" x2="367.0" y2="73.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="360.0" y1="66.5" x2="360.0" y2="80.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="360.0" y="46.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P3</text>
  <text x="360.0" y="105.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(360,74)mm</text>
  <!-- P4 (60.0,223.5)mm -->
  <circle cx="60.00" cy="223.50" r="25.0" fill="#FFF8E8" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="53.0" y1="223.5" x2="67.0" y2="223.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="60.0" y1="216.5" x2="60.0" y2="230.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="60.0" y="196.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P4</text>
  <text x="60.0" y="255.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(60,224)mm</text>
  <!-- P5 (210.0,223.5)mm -->
  <circle cx="210.00" cy="223.50" r="25.0" fill="#E8F4FE" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="203.0" y1="223.5" x2="217.0" y2="223.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="210.0" y1="216.5" x2="210.0" y2="230.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="210.0" y="196.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P5</text>
  <text x="210.0" y="255.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(210,224)mm</text>
  <!-- P6 (360.0,223.5)mm -->
  <circle cx="360.00" cy="223.50" r="25.0" fill="#FFF8E8" stroke="#1A73E8" stroke-width="0.8"/>
  <line x1="353.0" y1="223.5" x2="367.0" y2="223.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <line x1="360.0" y1="216.5" x2="360.0" y2="230.5" stroke="#1A73E8" stroke-width="0.35" stroke-dasharray="2,2"/>
  <text x="360.0" y="196.5" text-anchor="middle" font-size="6" font-weight="bold" fill="#1A73E8" font-family="sans-serif">P6</text>
  <text x="360.0" y="255.5" text-anchor="middle" font-size="5" fill="#555" font-family="monospace">(360,224)mm</text>

  <!-- Footer -->
  <text x="210.0" y="292.0" text-anchor="middle"
        font-size="5.5" fill="#999" font-family="sans-serif">
    Navigation Grid  |  3x2 = 6 positions  |
    D=50mm  |  150mm pitch (100mm gap)  |  Top-left corner = REF (0,0)
  </text>

</svg>
</body>
</html>
